<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formlários em HTML5 e CSS3</title>
    <link rel="stylesheet" href="exerc2.css">
</head>
<body>
    <h1>Formulários com Banco de Dados</h1>

    <form action="receber-dados.php" method="post">
        <fieldset>
            <legend>Banco de dados - cadastro de informações</legend>

            <label class="alinha"> Código do cliente: </label>
            <input type="text" name="codigo" autofocus> <br>

            <label class="alinha"> Valor da compra (em R$): </label>
            <input type="number" name="valor-compra" min="0" max="10000" step="0.01"> <br> <br><!-- O step é usada para permitir colocar casas decimais 
             colocanos 0.0 porque são duas casa decimais; se fosse 3 seria 0.00; usamos 1 porque os centavos vão ate menor que 100 para 0.0 e 
              que 1000 para 0.00-->
            <label> Tipo de equipamento adquirido: </label> <br>
            <input type="radio" name="tipo-equipamento" value="1"> <label>Impressora</label> <br>
            <input type="radio" name="tipo-equipamento" value="2" checked> <label>Notebook</label> <br>
            <input type="radio" name="tipo-equipamento" value="3"> <label> Smartphone</label> <br>

            <button name="cadastrar-compra">Cadastrar compra</button>
        </fieldset>
        <fieldset>
            <legend>Banco de dados - alteração de informações</legend>

            <label class="alinha">Código do cliente para pesquisa: </label>
            <input type="text" name="pesquisa-codigo"> <br>

            <label class="alinha">Retificação do valor da Compra</label>
            <input type="number" name="novo-valor-compra" min="0" max="10000" step="0.01"> <br>

            <button name="alterar-preco">Alterar calor da compra</button>
        </fieldset>
    </form>
    
</body>
</html>
